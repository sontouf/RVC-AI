# Reusable: publish deployment bundle (coverage + binaries).
on:
  workflow_call:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build tarball
        uses: actions/download-artifact@v4
        with:
          name: rvc-build-after-integration
          path: .

      - name: Extract build
        run: tar xzf rvc-build.tgz

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-bundle
          path: .

      - name: Publish deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: rvc-deployment-bundle
          path: |
            coverage-html/
            coverage.xml
            build/rvc_sim
            build/rvc_tickd
            build/rvc_unit_tests
            build/rvc_integration_tests
          retention-days: 30
          if-no-files-found: error
