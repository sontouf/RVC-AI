# Reusable: Python system_tests runner calls rvc_sim (black-box scenarios).
on:
  workflow_call:

jobs:
  system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build tarball
        uses: actions/download-artifact@v4
        with:
          name: rvc-build-after-integration
          path: .

      - name: Extract build
        run: tar xzf rvc-build.tgz

      - name: Make sim executable
        run: chmod +x build/rvc_sim build/rvc_tickd || true

      - name: rvc_tickd protocol smoke
        run: |
          printf '%s\n' \
            '{"op":"init","grid":["...",".#.","..."],"dust":[[1,1]],"start":{"row":1,"col":0,"heading":"E"}}' \
            '{"op":"tick"}' \
            '{"op":"quit"}' \
            | ./build/rvc_tickd | tail -n 1 | grep -q '"ok":true'

      - name: System tests (JSON scenarios → rvc_sim)
        run: python3 system_tests/run_all.py --sim ./build/rvc_sim

      - name: GUI headless smoke (import / tkinter check)
        run: RVC_HEADLESS=1 python3 sim/rvc_grid_gui.py
