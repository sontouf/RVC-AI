# Reusable: compile all targets (library, sim, unit & integration test binaries).
on:
  workflow_call:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure (coverage instrumentation for later gcovr)
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Debug -DRVC_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build

      - name: Upload build tree (binaries + gcno for coverage)
        uses: actions/upload-artifact@v4
        with:
          name: rvc-build-after-compile
          path: build/
          retention-days: 3
