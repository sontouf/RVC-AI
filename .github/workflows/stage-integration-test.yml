# Reusable: integration tests + coverage gate (library sources only).
on:
  workflow_call:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build (after unit tests)
        uses: actions/download-artifact@v4
        with:
          name: rvc-build-after-unit
          path: build

      - name: Make executables runnable
        run: chmod +x build/rvc_unit_tests build/rvc_integration_tests build/rvc_sim || true

      - name: "Integration tests (CTest label: integration)"
        run: ctest --test-dir build -L integration --output-on-failure

      - name: Install gcovr (venv; PEP 668 safe on ubuntu-latest)
        run: |
          python3 -m venv .gcovr-venv
          .gcovr-venv/bin/pip install --upgrade pip
          .gcovr-venv/bin/pip install gcovr==8.6

      - name: Line coverage gate (>= 90%, library only)
        run: >
          .gcovr-venv/bin/python -m gcovr
          --root .
          --fail-under-line 90
          --object-directory build
          --filter include/rvc/
          --filter src/rvc/
          --html-details coverage-html/index.html
          --xml coverage.xml

      - name: Upload coverage bundle
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bundle
          path: |
            coverage-html/
            coverage.xml
          retention-days: 14

      - name: Upload build after integration
        uses: actions/upload-artifact@v4
        with:
          name: rvc-build-after-integration
          path: build/
          retention-days: 3
