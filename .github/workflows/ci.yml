name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-deploy-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 python3-pip lcov
          python3 -m pip install --upgrade pip
          python3 -m pip install gcovr==7.0.1

      - name: Configure (coverage)
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Debug -DRVC_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build

      - name: Unit & integration tests
        run: ctest --test-dir build --output-on-failure

      - name: Line coverage gate (>= 90%)
        run: >
          gcovr
          --root .
          --fail-under-line 90
          --object-directory build
          --filter include/rvc/
          --filter src/rvc/
          --html-details coverage-html/index.html
          --xml coverage.xml

      - name: System tests (rvc_sim)
        run: python3 system_tests/run_all.py --sim ./build/rvc_sim

      - name: GUI headless smoke
        run: RVC_HEADLESS=1 python3 sim/rvc_grid_gui.py

      - name: Upload coverage HTML + binaries (deployment bundle)
        uses: actions/upload-artifact@v4
        with:
          name: rvc-ci-bundle
          path: |
            coverage-html/
            coverage.xml
            build/rvc_sim
            build/rvc_tests
