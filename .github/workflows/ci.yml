# Orchestrator: build → unit → integration (+coverage) → system (sim) → deploy bundle.
# Stages are split into reusable workflows under stage-*.yml for clarity and reuse.

name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Narrow defaults remove artifact permissions unless explicitly granted:
# https://docs.github.com/en/actions/security-guides/automatic-token-authentication
permissions:
  contents: read
  actions: write

jobs:
  build:
    uses: ./.github/workflows/stage-build.yml

  unit-test:
    needs: build
    uses: ./.github/workflows/stage-unit-test.yml

  integration-test:
    needs: unit-test
    uses: ./.github/workflows/stage-integration-test.yml

  system-test:
    needs: integration-test
    uses: ./.github/workflows/stage-system-test.yml

  deploy:
    needs: system-test
    uses: ./.github/workflows/stage-deploy.yml

  # Automated PR “code review”: checklist comment on the PR (complements human review).
  pr-code-review:
    if: github.event_name == 'pull_request'
    needs: [deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: Post automated review summary
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '### Automated CI review (bot)',
              '',
              'All pipeline stages completed for this PR: **build → unit-test → integration (+coverage) → system-test (sim) → deploy artifact**. ',
              '',
              `- Workflow run: ${runUrl}`,
              `- Deployment artifact: **rvc-deployment-bundle** (binaries + coverage HTML/XML)`,
              '',
              '**Human reviewer checklist**',
              '- [ ] Requirements ↔ tests traceability updated (`arch/vnv/tdd-traceability.md`)',
              '- [ ] OOAD docs updated if public behavior changed (`arch/`)',
              '- [ ] No unnecessary complexity in `CleaningCoordinator` / `GridWorld` (SOLID, readability)',
              '- [ ] System scenarios (`system_tests/maps/`) still meaningful for the change',
              '',
              '_This comment is generated by `.github/workflows/ci.yml` (job `pr-code-review`)._',
            ].join('\n');

            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = '<!-- rvc-ci-review-bot -->';
            const existing = comments.find((c) => c.body.includes(marker));

            const fullBody = marker + '\n' + body;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: fullBody,
              });
            }
